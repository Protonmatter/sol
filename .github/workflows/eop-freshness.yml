name: EOP freshness

on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  freshness:
    name: IERS prediction coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Require at least 90 days of EOP prediction coverage
        run: python tools/check_eop_freshness.py --minimum-days 90
