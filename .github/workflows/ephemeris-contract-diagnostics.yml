name: Ephemeris contract diagnostics

on:
  push:
    branches: ["precision/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ephemeris-contract-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    name: Coordinate and event invariants
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30

      - name: Generate fixture
        run: cargo run --quiet --locked -p solar-ephemeris --example snapshot > /tmp/ephemeris-v2.json

      - name: Publish generated fixture
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ephemeris-v2-diagnostic
          path: /tmp/ephemeris-v2.json
          if-no-files-found: error
          retention-days: 1

      - name: Body names, coordinate aliases, distances, and lunar parallax
        run: |
          python - <<'PY'
          import copy
          import json
          import sys
          from pathlib import Path
          sys.path.insert(0, "tools")
          import validate_ephemeris_snapshot as validator
          data = json.loads(Path("/tmp/ephemeris-v2.json").read_text(encoding="utf-8"))
          bodies = copy.deepcopy(data["bodies"])
          for body in bodies:
              body["rise_jd"] = None
              body["transit_jd"] = None
              body["set_jd"] = None
          errors = validator.check_bodies(bodies, data["time"], data["observer"])
          if errors:
              print("\n".join(f"ERROR: {error}" for error in errors), file=sys.stderr)
              raise SystemExit(1)
          PY

      - name: Rise transit and set local-day bounds
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path
          sys.path.insert(0, "tools")
          import validate_ephemeris_snapshot as validator
          data = json.loads(Path("/tmp/ephemeris-v2.json").read_text(encoding="utf-8"))
          start = validator.local_solar_day_start(
              float(data["time"]["jd_utc"]),
              float(data["observer"]["terrestrial_lon_deg_east"]),
          )
          end = start + 1.0
          errors = []
          for index, body in enumerate(data["bodies"]):
              for field in ("rise_jd", "transit_jd", "set_jd"):
                  value = body.get(field)
                  if value is not None and not start - 2e-7 <= float(value) <= end + 2e-7:
                      errors.append(
                          f"bodies[{index}] {body.get('name')}.{field}={value} outside [{start}, {end}]"
                      )
          if errors:
              print("\n".join(f"ERROR: {error}" for error in errors), file=sys.stderr)
              raise SystemExit(1)
          PY
