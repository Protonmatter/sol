name: CI

on:
  push:
    branches: [master, "precision/**", "redesign/**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Rust tests (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace
        run: cargo test --workspace --locked

  lint:
    name: Rust lint (fmt + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy (-D warnings)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  wasm:
    name: WASM build (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build solar-wasm + solar-ephemeris
        run: |
          cargo build --release --locked -p solar-wasm --target wasm32-unknown-unknown
          cargo build --release --locked -p solar-ephemeris --target wasm32-unknown-unknown

  web:
    name: Web and contract validation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable

      - name: JavaScript syntax (native ESM)
        shell: bash
        run: |
          status=0
          while IFS= read -r -d '' file; do
            if ! node --check "$file"; then
              echo "::error file=$file::JavaScript syntax error"
              status=1
            fi
          done < <(find apps/web tools \( -name '*.js' -o -name '*.mjs' \) -print0)
          exit $status

      - name: Python syntax
        run: python -m compileall -q tools services/ephemeris-server

      - name: Solar snapshot contract (v2)
        run: python tools/validate_snapshot.py apps/web/data/latest-state.json

      - name: Operational-readiness gate
        run: python tools/validate_operational_readiness.py apps/web/data/latest-state.json

      - name: Regenerate deterministic solar-cycle series
        run: python tools/generate_series.py

      - name: Series frames validate (solar-state-snapshot.v2)
        shell: bash
        run: |
          status=0
          for file in apps/web/data/series/frame-*.json; do
            python tools/validate_snapshot.py "$file" || status=1
          done
          exit $status

      - name: Series regeneration is byte-stable
        shell: bash
        run: |
          cp -a apps/web/data/series /tmp/series-a
          python tools/generate_series.py
          diff -qr /tmp/series-a apps/web/data/series

      - name: Deterministic solar fixture regeneration
        shell: bash
        run: |
          python tools/generate_fixture_snapshot.py --out /tmp/det-a.json --observations-out tests/fixtures/live-swpc-normalized.json
          python tools/generate_fixture_snapshot.py --out /tmp/det-b.json --observations-out /tmp/det-b-obs.json
          cmp /tmp/det-a.json /tmp/det-b.json
          python tools/validate_snapshot.py /tmp/det-a.json
          if ! git diff --quiet -- tests/fixtures/live-swpc-normalized.json; then
            echo "::error::fixture generator drifted from the committed observation fixture"
            git --no-pager diff --stat -- tests/fixtures/live-swpc-normalized.json
            exit 1
          fi

      - name: Generate and validate on-device ephemeris v2
        run: |
          cargo run --quiet --locked -p solar-ephemeris --example snapshot > /tmp/ephemeris-v2.json
          python tools/validate_ephemeris_snapshot.py /tmp/ephemeris-v2.json
          node tools/test_ephemeris_contract.mjs /tmp/ephemeris-v2.json

      - name: Validate optional DE441 provider contract offline
        run: python services/ephemeris-server/test_server.py -v

      - name: Build static web cache tokens deterministically
        shell: bash
        run: |
          python tools/build_web.py
          cp -a apps/web /tmp/web-stamped
          python tools/build_web.py
          diff -qr /tmp/web-stamped apps/web

      - name: Static web validation after build stamping
        run: python tools/validate_web_static.py
