name: CI

on:
  push:
    branches: [master, "redesign/**"]
  pull_request:

# Newer pushes to the same ref cancel in-flight runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Rust tests (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace
        run: cargo test --workspace

  lint:
    name: Rust lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned so the clippy lint set is deterministic — a newer stable can add lints that would
      # fail `-D warnings` on code that was clean before. Bump deliberately.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      # rustfmt's own `ignore` option is nightly-only, so on stable we format everything and then
      # diff, excluding the machine-generated coefficient tables (see rustfmt.toml).
      - name: rustfmt (generated *_data.rs excluded)
        run: |
          cargo fmt --all
          if git diff --quiet -- '*.rs' \
              ':(exclude)crates/solar-ephemeris/src/vsop2013_data.rs' \
              ':(exclude)crates/solar-ephemeris/src/elpmpp02_data.rs' \
              ':(exclude)crates/solar-ephemeris/src/top2013_data.rs'; then
            echo "hand-written Rust is rustfmt-clean"
          else
            echo "::error::not rustfmt-clean — run 'cargo fmt --all' and commit (generated *_data.rs are exempt)"
            git --no-pager diff -- '*.rs' \
              ':(exclude)crates/solar-ephemeris/src/vsop2013_data.rs' \
              ':(exclude)crates/solar-ephemeris/src/elpmpp02_data.rs' \
              ':(exclude)crates/solar-ephemeris/src/top2013_data.rs'
            exit 1
          fi
          git checkout -- .

      - name: clippy (-D warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  wasm:
    name: WASM build (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build solar-wasm + solar-ephemeris
        run: |
          cargo build --release -p solar-wasm --target wasm32-unknown-unknown
          cargo build --release -p solar-ephemeris --target wasm32-unknown-unknown

  web:
    name: Web (JS syntax + validators + cache-bust sync)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: JS syntax (node --check, ESM)
        shell: bash
        run: |
          status=0
          while IFS= read -r -d '' f; do
            if ! node --check "$f"; then
              echo "::error file=$f::JavaScript syntax error"
              status=1
            fi
          done < <(find apps/web -name '*.js' -not -path '*/pkg/*' -print0)
          exit $status

      - name: Static web validation
        run: python tools/validate_web_static.py

      - name: Snapshot contract (solar-state-snapshot.v1)
        run: python tools/validate_snapshot.py apps/web/data/latest-state.json

      - name: Operational-readiness gate
        run: python tools/validate_operational_readiness.py apps/web/data/latest-state.json

      - name: Cache-bust tokens in sync
        shell: bash
        run: |
          python tools/build_web.py
          if ! git diff --quiet; then
            echo "::error::?v= cache-bust tokens are stale — run 'python tools/build_web.py' and commit the result."
            git --no-pager diff --stat
            exit 1
          fi
