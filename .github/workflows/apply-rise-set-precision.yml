name: Apply rise-set precision migration

on:
  push:
    branches: ["precision/p0-hardening"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-rise-set-precision
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          ref: precision/p0-hardening
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Apply bounded source transformation
        run: python tools/apply_rise_set_precision.py
      - name: Format and validate the complete workspace
        run: |
          cargo fmt --all
          cargo test --workspace --locked
          cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Commit exact validated source
        run: |
          if git diff --quiet -- crates/solar-ephemeris/src/lib.rs; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/solar-ephemeris/src/lib.rs
          git commit -m "fix(ephemeris): correct rise-set thresholds and day boundaries"
          git push origin HEAD:precision/p0-hardening
