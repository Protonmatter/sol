name: Apply precision migrations

on:
  push:
    branches: ["precision/p0-hardening"]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-precision-migrations
  cancel-in-progress: true

jobs:
  apply:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: precision/p0-hardening
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: "1.96.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Apply bounded source transformations
        run: |
          python tools/apply_rise_set_precision.py
          python tools/apply_sky_timezone_copy.py
          python tools/build_web.py
      - name: Rust format
        run: cargo fmt --all
      - name: Rust workspace tests
        run: cargo test --workspace --locked
      - name: Capture Clippy diagnostics
        shell: bash
        run: |
          set +e
          cargo clippy --workspace --all-targets --locked -- -D warnings > /tmp/clippy.log 2>&1
          echo $? > /tmp/clippy.status
          exit 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rise-set-clippy-diagnostic
          path: |
            /tmp/clippy.log
            /tmp/clippy.status
          if-no-files-found: error
          retention-days: 1
      - name: Enforce Clippy result
        shell: bash
        run: |
          status=$(cat /tmp/clippy.status)
          if [[ "$status" != "0" ]]; then
            cat /tmp/clippy.log
            exit "$status"
          fi
      - name: JavaScript syntax
        run: node --check apps/web/js/sky.js
      - name: Static web validation
        run: python tools/validate_web_static.py
      - name: Commit exact validated source
        run: |
          if git diff --quiet -- crates/solar-ephemeris/src/lib.rs apps/web; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/solar-ephemeris/src/lib.rs apps/web
          git commit -m "fix(precision): correct event semantics and timezone disclosure"
          git push origin HEAD:precision/p0-hardening
