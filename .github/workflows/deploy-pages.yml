name: Deploy web app (GitHub Pages)

# Production publishes only the exact master SHA that completed the full CI workflow.
# A manual dispatch remains available for an explicitly reviewed recovery deployment.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build tested static site
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build WASM engines from the tested source
        run: python tools/build_wasm.py

      - name: Regenerate canonical deterministic cycle series
        run: |
          python tools/generate_series.py
          for file in apps/web/data/series/frame-*.json; do
            python tools/validate_snapshot.py "$file"
          done

      # Remote surface maps are deliberately opt-in because upstream mutable URLs do not
      # produce a byte-reproducible deployment. The renderer has a deterministic procedural
      # fallback. Set repository variable SOL_FETCH_REMOTE_TEXTURES=true only for a reviewed
      # deployment where that trade-off is accepted.
      - name: Fetch optional remote textures
        if: vars.SOL_FETCH_REMOTE_TEXTURES == 'true'
        continue-on-error: true
        run: python tools/fetch_textures.py --force

      - name: Stamp content-derived cache tokens
        run: python tools/build_web.py

      - name: Validate built artifact
        run: |
          python tools/validate_web_static.py
          test -s apps/web/pkg/solar_wasm.wasm
          test -s apps/web/pkg/solar_ephemeris.wasm

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: apps/web

  deploy:
    name: Deploy tested SHA
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
