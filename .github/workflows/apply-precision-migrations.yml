name: Apply pending P0 migrations

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: precision/p0-hardening
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Apply pending transformations
        run: |
          python tools/apply_solar_fixture_v2.py
          python tools/apply_ephemeris_validator_query_p0.py
          python tools/apply_ephemeris_validator_main_p0.py
          cargo fmt --all
      - name: Regenerate and validate deterministic fixtures
        run: |
          python tools/generate_fixture_snapshot.py --out apps/web/data/latest-state.json --observations-out tests/fixtures/live-swpc-normalized.json
          python tools/generate_series.py --base apps/web/data/latest-state.json --out-dir apps/web/data/series
          python tools/validate_snapshot.py apps/web/data/latest-state.json
          for file in apps/web/data/series/frame-*.json; do python tools/validate_snapshot.py "$file"; done
      - name: Commit transformed sources
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/generate_fixture_snapshot.py tools/generate_series.py tools/validate_ephemeris.py docs/solar-state-snapshot-v2.schema.json apps/web/data/latest-state.json apps/web/data/series tests/fixtures/live-swpc-normalized.json
          git commit -m "feat(precision): finalize P0 contracts and fixtures [skip ci]"
          git push origin HEAD:precision/p0-hardening
