name: Apply precision migrations

on:
  push:
    branches:
      - precision/p0-hardening
    paths:
      - tools/apply_ephemeris_core_p0.py
      - tools/apply_ephemeris_serializer_p0.py
      - tools/apply_solar_fixture_v2.py
      - .github/workflows/apply-precision-migrations.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: precision/p0-hardening
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Apply source migrations
        run: |
          python tools/apply_ephemeris_core_p0.py
          python tools/apply_ephemeris_serializer_p0.py
          python tools/apply_solar_fixture_v2.py
          cargo fmt --all
      - name: Commit generated source
        run: |
          if git diff --quiet; then
            echo "No migration changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/solar-ephemeris/src/lib.rs tools/generate_fixture_snapshot.py tools/generate_series.py
          git commit -m "feat(precision): apply P0 source migrations [skip ci]"
          git push origin HEAD:precision/p0-hardening
